<style>
  :root{
    --bg:#FCF8F6; --ink:#2A1A2E; --plum:#6E3B5C; --lacquer:#C43E6D; --lacquerDeep:#A62B57;
    --blush:#F7E9EE; --line:#EAD3DC; --champ:#B8924F; --ok:#4E8D6E; --warn:#C9743B;
    --muted:#8B7683; --white:#fff;
    --f-disp:'Fraunces',Georgia,'Times New Roman',serif; --f-body:'Inter',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--f-body);-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}
  .hidden{display:none!important}
  .disp{font-family:var(--f-disp)}
  .m-cup{display:block}
  .m-usd{display:block;font-size:.74em;color:var(--muted);font-weight:400}

  #gate{min-height:100vh;min-height:100dvh;display:grid;place-items:center;padding:24px}
  .card{background:var(--white);border:1px solid var(--line);border-radius:20px;padding:30px 26px;width:100%;max-width:420px;box-shadow:0 20px 50px -30px rgba(110,59,92,.5)}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .brand .name{font-family:var(--f-disp);font-size:28px;font-weight:600;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:14px;margin:0 0 22px}
  .rolerow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .rolebtn{text-align:left;background:var(--white);border:1px solid var(--line);border-radius:16px;padding:18px}
  .rolebtn:hover{border-color:var(--lacquer)}
  .rolebtn .ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;margin-bottom:12px}
  .rolebtn .t{font-family:var(--f-disp);font-size:17px;font-weight:600}
  .rolebtn .d{font-size:12.5px;color:var(--muted);margin-top:4px;line-height:1.45}
  label.fld{display:block;font-size:12.5px;color:var(--plum);font-weight:500;margin:14px 0 6px}
  .in{width:100%;border:1px solid var(--line);border-radius:11px;padding:12px 13px;font-size:15px;color:var(--ink);background:var(--white);outline:none}
  .in:focus{border-color:var(--lacquer)}
  .btn{background:var(--lacquer);color:#fff;border:none;border-radius:11px;padding:13px 16px;font-size:14.5px;font-weight:600;width:100%}
  .btn:hover{background:var(--lacquerDeep)}
  .btn[disabled]{opacity:.5;cursor:not-allowed}
  .btn.alt{background:transparent;color:var(--plum);border:1px solid var(--line)}
  .err{color:#B0342F;font-size:13px;margin-top:10px;min-height:16px}
  .link{background:none;border:none;color:var(--muted);font-size:12.5px;text-decoration:underline;margin-top:12px;padding:0}

  #app{min-height:100vh;min-height:100dvh}
  .top{position:sticky;top:0;z-index:20;background:rgba(252,248,246,.92);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .top .row{max-width:1080px;margin:0 auto;padding:11px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .pill{font-size:12px;color:var(--plum);background:var(--blush);border-radius:999px;padding:3px 10px}
  .off{font-size:11px;color:var(--ok);display:inline-flex;align-items:center;gap:5px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);display:inline-block}
  .ghost{background:transparent;color:var(--plum);border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:13px}
  .wrap{max-width:1080px;margin:0 auto;padding:20px 18px 70px}
  .tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .tab{padding:9px 15px;border-radius:999px;border:none;font-size:14px;font-weight:500;background:transparent;color:var(--plum)}
  .tab.on{background:var(--ink);color:#fff}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
  .kpi{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:16px;position:relative;overflow:hidden}
  .kpi .bar{position:absolute;left:0;top:0;bottom:0;width:4px}
  .kpi .lab{font-size:12px;color:var(--muted);margin-bottom:7px}
  .kpi .val{font-family:var(--f-disp);font-size:22px;font-weight:600}
  .cols{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;align-items:start}
  .panel{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:18px}
  .panel h3{font-family:var(--f-disp);font-weight:600;font-size:16px;margin:0 0 12px;display:flex;justify-content:space-between;align-items:baseline}
  .empty{color:var(--muted);font-size:13.5px;text-align:center;padding:22px 0;line-height:1.55}
  .feed .it{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--blush)}
  .feed .it:last-child{border-bottom:none}
  .feed .desc{font-size:14px;font-weight:500}
  .feed .meta{font-size:12px;color:var(--muted);margin-top:3px}
  .feed .amt{font-family:var(--f-disp);font-weight:600;color:var(--lacquerDeep);white-space:nowrap;margin-left:12px;text-align:right}
  .lowrow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--blush);font-size:13.5px}
  .lowrow:last-child{border-bottom:none}
  .lowrow .n{color:var(--warn);font-weight:600}

  .tblwrap{background:var(--white);border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .thead,.trow{display:grid;grid-template-columns:2.4fr 1fr 1fr 1.6fr;align-items:center}
  .thead{padding:12px 18px;background:var(--blush);font-size:12px;font-weight:600;color:var(--plum)}
  .trow{padding:12px 18px;border-top:1px solid var(--blush)}
  .trow .pn{font-size:14px;font-weight:500}
  .pnrow{display:flex;align-items:center;gap:10px}
  .thumb{width:42px;height:42px;border-radius:9px;object-fit:cover;background:var(--blush);flex:none;border:1px solid var(--line)}
  .thumb.ph{display:grid;place-items:center;color:var(--muted);font-size:15px}
  .cat{font-size:12px;padding:3px 9px;background:var(--blush);border-radius:999px;color:var(--plum);display:inline-block}
  .step{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--white);font-size:15px;color:var(--plum);line-height:1}
  .stepn{min-width:30px;text-align:center;font-family:var(--f-disp);font-weight:600}
  .stk{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .bar-actions{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px}
  .mini{font-size:13.5px;color:var(--muted)}
  .btn-sm{background:var(--lacquer);color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:13.5px;font-weight:600}
  .btn-sm.alt{background:transparent;color:var(--plum);border:1px solid var(--line)}
  .addform{background:var(--white);border:1px solid var(--line);border-radius:16px 16px 0 0;padding:16px;display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr auto;gap:9px;align-items:center}
  .addform2{background:var(--white);border:1px solid var(--line);border-top:none;border-radius:0 0 16px 16px;padding:0 16px 16px;margin-bottom:14px;display:flex;gap:10px;align-items:center;font-size:13px;color:var(--muted)}
  .addform .in{padding:9px 10px;font-size:13.5px}
  .badge{font-size:11px;padding:2px 9px;border-radius:999px;display:inline-block;font-weight:600}
  .b-def{background:#F7E0E4;color:#A62B57}
  .b-mer{background:#F3E7D4;color:#8a6516}
  .b-otr{background:var(--blush);color:var(--plum)}

  .clerk{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start}
  .filters{display:flex;gap:9px;margin-bottom:14px;flex-wrap:wrap}
  .chip{border:1px solid var(--line);background:var(--white);color:var(--plum);border-radius:999px;padding:7px 12px;font-size:12.5px}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px}
  .prod{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:14px}
  .prod.sel{border-color:var(--lacquer)}
  .prodimg{width:100%;height:104px;border-radius:10px;object-fit:cover;background:var(--blush);margin-bottom:8px;display:block;border:1px solid var(--line)}
  .prod .pn{font-size:14px;font-weight:500;min-height:38px;line-height:1.35}
  .prod .meta{display:flex;justify-content:space-between;align-items:flex-start;margin-top:8px;gap:8px}
  .prod .price{font-family:var(--f-disp);font-weight:600;color:var(--lacquerDeep);font-size:14px}
  .prod .qty{font-size:11.5px;color:var(--muted);white-space:nowrap;padding-top:2px}
  .prod .sell{background:var(--lacquer);color:#fff;border:none;border-radius:9px;padding:9px;font-size:13.5px;font-weight:600;width:100%;margin-top:10px}
  .prod .stepper{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
  .ticket{position:sticky;top:74px;background:var(--white);border:1px solid var(--line);border-radius:16px;padding:18px;display:flex;flex-direction:column;max-height:82vh;max-height:82dvh}
  .ticket h3{font-family:var(--f-disp);font-weight:600;font-size:17px;margin:0}
  .ticket .who{font-size:12px;color:var(--muted);margin:2px 0 12px}
  .ticket .items{flex:1;overflow-y:auto}
  .titem{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--blush);font-size:13.5px;gap:8px}
  .ttot{display:flex;justify-content:space-between;align-items:flex-start;margin:14px 0 12px;gap:8px}
  .ttot .n{font-family:var(--f-disp);font-weight:600;font-size:20px;text-align:right}

  .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .ratebox{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:999px;font-size:14px;font-weight:500;box-shadow:0 12px 30px -8px rgba(0,0,0,.4);z-index:60;opacity:0;transition:opacity .2s;max-width:90vw;text-align:center}
  .toast.show{opacity:1}
  @media (max-width:820px){
    .kpis{grid-template-columns:1fr 1fr}
    .cols,.clerk,.settings-grid{grid-template-columns:1fr}
    .ticket{position:static;max-height:none;order:-1}
    .addform{grid-template-columns:1fr 1fr}
    .thead,.trow{grid-template-columns:1.7fr 1fr 1.5fr;font-size:13px}
    .thead span:nth-child(3),.trow > div:nth-child(3){display:none}
  }
  .shareov{position:fixed;inset:0;background:rgba(42,26,46,.5);display:flex;align-items:center;justify-content:center;padding:20px;z-index:80}
  .sharebox{background:var(--white);border-radius:18px;padding:22px;width:100%;max-width:440px;box-shadow:0 20px 50px -20px rgba(0,0,0,.4);max-height:90vh;max-height:90dvh;overflow-y:auto}
  .sharetxt{width:100%;height:220px;border:1px solid var(--line);border-radius:12px;padding:12px;font-size:12.5px;font-family:ui-monospace,monospace;color:var(--ink);background:var(--bg);resize:none;outline:none}
  .mform label{display:block;font-size:12.5px;color:var(--plum);font-weight:500;margin:12px 0 6px}
  .mform textarea{width:100%;min-height:80px;border:1px solid var(--line);border-radius:11px;padding:11px;font-size:14px;color:var(--ink);background:var(--white);outline:none;resize:vertical}
</style>
</head>

<script>
const SB_URL="https://rmdtwanaaanbbybozwue.supabase.co";
const SB_KEY="sb_publishable_VhJ6oqTcZ9vmSr1EbHSxVg_fqmoYpL7";
const sb = supabase.createClient(SB_URL, SB_KEY);

const $ = (s)=>document.querySelector(s);
const fmt = (n)=>(Number(n)||0).toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2});
const esc = (s)=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const timeStr = (iso)=>new Date(iso).toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});
const isToday = (iso)=>{const d=new Date(iso),t=new Date();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate();};
const startOfToday=()=>{const d=new Date();d.setHours(0,0,0,0);return d.toISOString();};
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2800);}

const CATS=["Esmaltes","Herramientas","Cuidado","Kits","Higiene","Otros"];
let ME=null, PRODUCTS=[], SETTINGS={usd_rate:420,usd_rate_at:null,zelle_factor:1.03}, CURRENT=null, channel=null;

function rate(){ return Number(SETTINGS.usd_rate)||0; }
function zfactor(){ return Number(SETTINGS.zelle_factor)||0; }
function cup(n){ return fmt(n)+" CUP"; }
function usdOf(n){ const r=rate(); return r>0 ? n/r : null; }
function zelleOf(n){ const u=usdOf(n); const z=zfactor(); return (u!=null && z>0) ? u*z : null; }
function money(n){ const u=usdOf(n); const z=zelleOf(n); return `<span class="m-cup">${cup(n)}</span>${u!=null?`<span class="m-usd">≈ $${fmt(u)} USD</span>`:""}${z!=null?`<span class="m-usd" style="color:var(--champ)">≈ $${fmt(z)} Zelle</span>`:""}`; }
function moneyInline(n){ const u=usdOf(n); const z=zelleOf(n); return cup(n)+(u!=null?` (≈ $${fmt(u)} USD`:"")+(z!=null?` · $${fmt(z)} Zelle)`:(u!=null?")":"")); }
function moneyMsg(n){ const u=usdOf(n); const z=zelleOf(n); return cup(n)+(u!=null?` (≈ $${fmt(u)} USD`:"")+(z!=null?` · $${fmt(z)} Zelle)`:(u!=null?")":"")); }

function compressImage(file,maxSize,quality){return new Promise((res,rej)=>{const rd=new FileReader();rd.onload=()=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;if(w>h){if(w>maxSize){h=Math.round(h*maxSize/w);w=maxSize;}}else{if(h>maxSize){w=Math.round(w*maxSize/h);h=maxSize;}}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',quality));};img.onerror=rej;img.src=rd.result;};rd.onerror=rej;rd.readAsDataURL(file);});}

/* ---------- AUTH ---------- */

async function doLogin(){
  const email=$("#email").value.trim(), password=$("#pass").value;
  const err=$("#loginErr"); err.textContent="";
  if(!email||!password){err.textContent="Escribe tu correo y contraseña.";return;}
  $("#loginBtn").disabled=true; $("#loginBtn").textContent="Entrando…";
  const { error } = await sb.auth.signInWithPassword({ email, password });
  $("#loginBtn").disabled=false; $("#loginBtn").textContent="Entrar";
  if(error){ err.textContent="No pudimos entrar. Revisa el correo y la contraseña."; return; }
  await afterLogin();
}

async function afterLogin(){
  const { data:{ user } } = await sb.auth.getUser();
  if(!user) return;
  const { data: staff, error } = await sb.from("staff").select("id,full_name,role,active").eq("id",user.id).single();
  if(error || !staff){ $("#loginErr").textContent="Tu cuenta aún no tiene ficha de personal. Avisa a la administradora."; await sb.auth.signOut(); return; }
  if(!staff.active){ $("#loginErr").textContent="Tu cuenta está desactivada."; await sb.auth.signOut(); return; }
  ME=staff;
  $("#login").classList.add("hidden");
  $("#app").classList.remove("hidden");
  $("#rolePill").textContent = ME.role==="admin" ? "Administradora" : ("Vendedora · "+ME.full_name);

async function loadSettings(){ const {data}=await sb.from("settings").select("usd_rate,usd_rate_at,whatsapp,zelle_factor").eq("id",1).single(); if(data)SETTINGS=data; }
async function refreshProducts(){ await loadProducts(); rerender(); }
async function loadProducts(){ const {data,error}=await sb.from("products").select("*").eq("active",true).order("name"); if(!error)PRODUCTS=data||[]; return PRODUCTS; }
async function loadTodaySales(){ const {data,error}=await sb.from("sales").select("id,total,units,created_at,seller_name,sale_items(qty,product_name,line_total,unit_cost)").gte("created_at",startOfToday()).order("created_at",{ascending:false}); return error?[]:(data||[]); }
async function loadProfitAllTime(){
  // suma line_total y unit_cost*qty de TODAS las ventas (paginado por si hay muchas)
  let from=0, size=1000, rev=0, cost=0, units=0, sales=0, more=true, lastSale=null;
  const sc=await sb.from("sales").select("id",{count:"exact",head:true});
  sales = sc.count||0;
  while(more){
    const {data,error}=await sb.from("sale_items").select("qty,line_total,unit_cost").range(from,from+size-1);
    if(error||!data||data.length===0){ more=false; break; }
    data.forEach(function(r){ rev+=Number(r.line_total)||0; cost+=(Number(r.unit_cost)||0)*(Number(r.qty)||0); units+=Number(r.qty)||0; });
    if(data.length<size) more=false; else from+=size;
  }
  return {rev:rev, cost:cost, profit:rev-cost, units:units, sales:sales};
}
async function loadReturns(){ const {data,error}=await sb.from("returns").select("*").order("created_at",{ascending:false}).limit(100); return error?[]:(data||[]); }

function subscribeRealtime(){
  if(channel) return;
  channel=sb.channel("divas-live")
    .on("postgres_changes",{event:"*",schema:"public",table:"sales"}, async()=>{ if(ME.role==="admin"&&CURRENT==="dash") renderDash(); })
    .on("postgres_changes",{event:"*",schema:"public",table:"products"}, async()=>{ await loadProducts(); rerender(); })
    .on("postgres_changes",{event:"*",schema:"public",table:"returns"}, async()=>{ if(ME.role==="admin"){ if(CURRENT==="ret")renderReturns(); else if(CURRENT==="dash")renderDash(); } })
    .subscribe();
}
function rerender(){ if(CURRENT==="sell")renderSell(); else if(CURRENT==="inv")renderInv(); else if(CURRENT==="dash")renderDash(); else if(CURRENT==="ret")renderReturns(); }

function repQuick(which){
  const t=new Date(); const f=new Date();
  if(which==="hoy"){ }
  else if(which==="semana"){ f.setDate(t.getDate()-6); }
  else if(which==="mes"){ f.setDate(1); }
  else if(which==="todo"){ f.setFullYear(2020,0,1); }
  const iso=(d)=>d.toISOString().slice(0,10);
  const rf=$("#repFrom"), rt=$("#repTo");
  if(rf) rf.value=iso(f); if(rt) rt.value=iso(t);
  runReport();
}
async function runReport(){
  const rf=$("#repFrom"), rt=$("#repTo");
  if(!rf||!rt||!rf.value||!rt.value){ toast("Elige las dos fechas (o usa un atajo)."); return; }
  const startISO=new Date(rf.value+"T00:00:00").toISOString();
  const endISO=new Date(rt.value+"T23:59:59.999").toISOString();
  $("#repOut").innerHTML='<div class="mini">Generando reporte…</div>';
  // 1) traer ventas del rango
  const {data:sales,error}=await sb.from("sales").select("id,total,units,created_at,seller_name,sale_items(product_name,qty,unit_price,line_total,unit_cost)").gte("created_at",startISO).lte("created_at",endISO).order("created_at",{ascending:true});
  if(error){ $("#repOut").innerHTML='<div class="mini" style="color:var(--warn)">No se pudo generar el reporte.</div>'; return; }
  // 2) agregar por producto
  const byProd={}; let tRev=0,tCost=0,tUnits=0;
  (sales||[]).forEach(function(s){ (s.sale_items||[]).forEach(function(l){
    const q=Number(l.qty)||0, rev=Number(l.line_total)||0, cost=(Number(l.unit_cost)||0)*q;
    if(!byProd[l.product_name]) byProd[l.product_name]={qty:0,rev:0,cost:0};
    byProd[l.product_name].qty+=q; byProd[l.product_name].rev+=rev; byProd[l.product_name].cost+=cost;
    tRev+=rev; tCost+=cost; tUnits+=q;
  }); });
  const rows=Object.entries(byProd).sort((a,b)=>b[1].rev-a[1].rev);
  const tProfit=tRev-tCost;
  // 3) pintar tabla en pantalla
  const dF=new Date(rf.value).toLocaleDateString("es-ES"), dT=new Date(rt.value).toLocaleDateString("es-ES");
  if(rows.length===0){ $("#repOut").innerHTML='<div class="empty">No hubo ventas en ese rango de fechas.</div>'; return; }
  let html='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px;min-width:520px">';
  html+='<tr style="background:var(--blush);color:var(--plum)"><th style="text-align:left;padding:9px 10px">Producto</th><th style="padding:9px 10px">Uds.</th><th style="padding:9px 10px;text-align:right">Ingresos</th><th style="padding:9px 10px;text-align:right">Inversión</th><th style="padding:9px 10px;text-align:right">Ganancia</th></tr>';
  rows.forEach(function(r){ const p=r[1]; html+='<tr style="border-top:1px solid var(--blush)"><td style="padding:8px 10px">'+esc(r[0])+'</td><td style="text-align:center">'+p.qty+'</td><td style="text-align:right;padding:8px 10px">'+cup(p.rev)+'</td><td style="text-align:right;padding:8px 10px;color:var(--plum)">'+cup(p.cost)+'</td><td style="text-align:right;padding:8px 10px;color:var(--ok);font-weight:600">'+cup(p.rev-p.cost)+'</td></tr>'; });
  html+='<tr style="border-top:2px solid var(--line);font-weight:600"><td style="padding:10px">TOTAL</td><td style="text-align:center">'+tUnits+'</td><td style="text-align:right;padding:10px">'+cup(tRev)+'</td><td style="text-align:right;padding:10px;color:var(--plum)">'+cup(tCost)+'</td><td style="text-align:right;padding:10px;color:var(--ok)">'+cup(tProfit)+'</td></tr>';
  html+='</table></div>';
  html+='<div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:14px">'
    +'<div class="kpi" style="flex:1;min-width:150px"><div class="lab">Ganancia del período</div><div class="val" style="color:var(--ok)">'+money(tProfit)+'</div></div>'
    +'<div class="kpi" style="flex:1;min-width:150px"><div class="lab">Ventas / unidades</div><div class="val">'+(sales.length)+' / '+tUnits+'</div></div></div>';
  html+='<button class="btn-sm" style="margin-top:14px" onclick=\'exportReport("'+rf.value+'","'+rt.value+'")\'>Guardar como imagen</button>';
  $("#repOut").innerHTML=html;
  window.__lastReport={dF:dF,dT:dT,rows:rows,tRev:tRev,tCost:tCost,tProfit:tProfit,tUnits:tUnits,nSales:(sales||[]).length};
}
async function exportReport(fromV,toV){
  const R=window.__lastReport; if(!R){toast("Genera primero el reporte");return;}
  const W=1000, pad=48, rowH=40, headH=210, footH=90;
  const H=headH+ (R.rows.length+1)*rowH + footH;
  const c=document.createElement('canvas'); c.width=W; c.height=H; const x=c.getContext('2d');
  x.fillStyle='#FCF8F6'; x.fillRect(0,0,W,H);
  // encabezado marca
  x.fillStyle='#2A1A2E'; x.font='600 40px Fraunces, Georgia, serif'; x.fillText('Divas', pad, 60);
  const wD=x.measureText('Divas ').width; x.fillStyle='#C43E6D'; x.font='italic 600 40px Fraunces, Georgia, serif'; x.fillText('Nails', pad+wD, 60);
  x.fillStyle='#6E3B5C'; x.font='600 22px Inter, sans-serif'; x.fillText('Reporte contable', pad, 96);
  x.fillStyle='#8B7683'; x.font='400 18px Inter, sans-serif'; x.fillText('Del '+R.dF+' al '+R.dT, pad, 124);
  // cabecera tabla
  let y=headH-40;
  x.fillStyle='#F7E9EE'; x.fillRect(pad, y-26, W-2*pad, 36);
  x.fillStyle='#6E3B5C'; x.font='600 16px Inter, sans-serif';
  x.fillText('Producto', pad+10, y); x.textAlign='center'; x.fillText('Uds.', pad+430, y);
  x.textAlign='right'; x.fillText('Ingresos', pad+620, y); x.fillText('Inversión', pad+770, y); x.fillText('Ganancia', W-pad-10, y);
  x.textAlign='left';
  y+=34;
  x.font='400 15px Inter, sans-serif';
  R.rows.forEach(function(r){ const p=r[1];
    x.fillStyle='#2A1A2E'; let nm=r[0]; while(x.measureText(nm).width>380 && nm.length>4){ nm=nm.slice(0,-2);} if(nm!==r[0]) nm+='…';
    x.fillText(nm, pad+10, y);
    x.textAlign='center'; x.fillStyle='#2A1A2E'; x.fillText(String(p.qty), pad+430, y);
    x.textAlign='right'; x.fillText(fmt(p.rev), pad+620, y);
    x.fillStyle='#6E3B5C'; x.fillText(fmt(p.cost), pad+770, y);
    x.fillStyle='#4E8D6E'; x.fillText(fmt(p.rev-p.cost), W-pad-10, y);
    x.textAlign='left';
    x.strokeStyle='#EAD3DC'; x.beginPath(); x.moveTo(pad,y+12); x.lineTo(W-pad,y+12); x.stroke();
    y+=rowH;
  });
  // total
  x.fillStyle='#2A1A2E'; x.font='600 16px Inter, sans-serif'; x.fillText('TOTAL', pad+10, y+4);
  x.textAlign='center'; x.fillText(String(R.tUnits), pad+430, y+4);
  x.textAlign='right'; x.fillText(fmt(R.tRev), pad+620, y+4);
  x.fillStyle='#6E3B5C'; x.fillText(fmt(R.tCost), pad+770, y+4);
  x.fillStyle='#4E8D6E'; x.fillText(fmt(R.tProfit), W-pad-10, y+4);
  x.textAlign='left';
  // pie: ganancia destacada
  x.fillStyle='#4E8D6E'; x.font='600 22px Inter, sans-serif';
  x.fillText('Ganancia del período: '+fmt(R.tProfit)+' CUP', pad, H-40);
  const u=usdOf(R.tProfit); if(u!=null){ x.fillStyle='#8B7683'; x.font='400 16px Inter, sans-serif'; x.fillText('≈ $'+fmt(u)+' USD · '+R.nSales+' ventas', pad, H-16); }
  const url=c.toDataURL('image/jpeg',0.92);
  try{ const blob=await (await fetch(url)).blob(); const file=new File([blob],'divas-reporte-'+fromV+'_'+toV+'.jpg',{type:'image/jpeg'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){ await navigator.share({files:[file],title:'Reporte contable Divas Nails'}); return; } }catch(err){ if(err&&err.name==='AbortError')return; }
  const a=document.createElement('a'); a.href=url; a.download='divas-reporte-'+fromV+'_'+toV+'.jpg'; a.click();
  toast('Reporte guardado');
}
const fmt3=(n)=>(Number(n)||0).toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:3});
async function saveZelle(){
  const v=parseFloat($("#zelleIn").value); if(!v||v<=0){toast("Escribe un factor válido (ej. 1.03).");return;}
  const {error}=await sb.from("settings").update({zelle_factor:v,updated_at:new Date().toISOString()}).eq("id",1);
  if(error){toast("No se pudo guardar el factor Zelle.");return;}
  SETTINGS.zelle_factor=v; toast("Factor Zelle actualizado"); renderSettings();
}
async function saveRate(){
  const v=parseFloat($("#rateIn").value); if(!v||v<=0){toast("Escribe una tasa válida (ej. 420).");return;}
  const {error}=await sb.from("settings").update({usd_rate:v,usd_rate_at:new Date().toISOString(),updated_at:new Date().toISOString()}).eq("id",1);
  if(error){toast("No se pudo guardar la tasa.");return;}
  SETTINGS.usd_rate=v; SETTINGS.usd_rate_at=new Date().toISOString(); toast("Tasa actualizada"); renderSettings();
}

async function saveWa(){
  var raw=$("#waIn").value.trim();
  var clean=raw.split(",").map(function(x){return x.replace(/[^0-9]/g,"");}).filter(function(x){return x.length>0;}).join(",");
  const {error}=await sb.from("settings").update({whatsapp:clean,updated_at:new Date().toISOString()}).eq("id",1);
  if(error){toast("No se pudo guardar el número.");return;}
  SETTINGS.whatsapp=clean; toast(clean?"Número(s) guardado(s)":"Número(s) borrado(s)"); renderSettings();
}
/* ================= DEVOLUCIONES (modal, admin y vendedora) ================= */
function openReturn(){
  const ov=document.createElement('div'); ov.className='shareov';
  ov.innerHTML=`<div class="sharebox mform">
    <div class="disp" style="font-size:18px;font-weight:600;margin-bottom:4px">Devolución / merma</div>
    <p style="font-size:12.5px;color:var(--muted);margin:0">Se descuenta del inventario y queda en el reporte de la administradora.</p>
    <label>Producto</label><select class="in" id="rProd">${PRODUCTS.map(p=>`<option value="${p.id}">${esc(p.name)} (stock ${p.stock})</option>`).join("")}</select>
    <label>Cantidad</label><input class="in" id="rQty" type="number" min="1" value="1" />
    <label>Motivo</label><select class="in" id="rReason"><option>Defecto</option><option>Merma</option><option>Otro</option></select>
    <label>¿Qué le sucede al producto?</label><textarea id="rNote" placeholder="Ej. El pincel viene seco / se rompió el frasco…"></textarea>
    <div style="display:flex;gap:8px;margin-top:16px"><button class="btn" style="flex:1" id="rSave">Guardar</button><button class="btn alt" style="flex:1" id="rCancel">Cancelar</button></div>
  </div>`;
  document.body.appendChild(ov);
  ov.onclick=(e)=>{ if(e.target===ov) ov.remove(); };
  ov.querySelector('#rCancel').onclick=()=>ov.remove();
  ov.querySelector('#rSave').onclick=async()=>{
    const pid=ov.querySelector('#rProd').value; const p=PRODUCTS.find(x=>x.id===pid); if(!p){toast('Elige un producto');return;}
    const qty=Math.max(1,parseInt(ov.querySelector('#rQty').value)||1);
    const reason=ov.querySelector('#rReason').value; const note=ov.querySelector('#rNote').value.trim();
    const btn=ov.querySelector('#rSave'); btn.disabled=true; btn.textContent="Guardando…";
    const {error:e1}=await sb.from("returns").insert({product_id:pid,product_name:p.name,qty,reason,note,seller_name:ME.full_name});
    if(e1){ toast("No se pudo registrar."); btn.disabled=false; btn.textContent="Guardar"; return; }
    await sb.from("products").update({stock:Math.max(0,p.stock-qty),updated_at:new Date().toISOString()}).eq("id",pid);
    ov.remove(); toast('Devolución/merma registrada'); await loadProducts();
    if(ME.role==='admin'&&CURRENT==='ret')renderReturns(); else if(ME.role!=='admin')renderSell();
  };
}

/* ================= VENDEDORA ================= */
let TICKET={}; let cFilter={q:"",cat:"Todo"};
function renderSell(){
  CURRENT="sell";
  const cats=["Todo",...CATS];
  const list=PRODUCTS.filter(p=>(cFilter.cat==="Todo"||p.category===cFilter.cat)&&p.name.toLowerCase().includes(cFilter.q.toLowerCase()));
  const cards=list.map(p=>{const inT=TICKET[p.id]||0,out=p.stock===0;
    const ctrl=inT===0?`<button class="sell" ${out?"disabled style='opacity:.5'":""} onclick="addT('${p.id}')">${out?"Agotado":"Vender"}</button>`
      :`<div class="stepper"><button class="step" onclick="subT('${p.id}')">−</button><span style="font-weight:600">${inT}</span><button class="step" ${inT>=p.stock?"disabled style='opacity:.4'":""} onclick="addT('${p.id}')">+</button></div>`;
    return `<div class="prod ${inT?'sel':''}" style="${out?'opacity:.5':''}">${p.img?`<img class="prodimg" src="${p.img}" alt="">`:''}<div class="pn">${esc(p.name)}</div><div class="meta"><span class="price">${money(p.price)}</span><span class="qty" style="${p.stock<=p.min_stock?'color:var(--warn)':''}">${p.stock} uds.</span></div>${ctrl}</div>`;}).join("");
  const lines=Object.entries(TICKET).filter(([,n])=>n>0);
  const total=lines.reduce((a,[id,n])=>{const p=PRODUCTS.find(x=>x.id===id);return a+(p?p.price*n:0);},0);
  const items=lines.length===0?`<div class="empty">Toca “Vender” en un producto para añadirlo.</div>`:lines.map(([id,n])=>{const p=PRODUCTS.find(x=>x.id===id);return p?`<div class="titem"><span>${n}× ${esc(p.name)}</span><span style="font-weight:600;text-align:right">${money(p.price*n)}</span></div>`:"";}).join("");
  $("#viewRoot").innerHTML=`<div class="clerk"><div>
    <div class="filters"><input class="in" style="flex:1;min-width:170px" id="cSearch" placeholder="Buscar producto…" value="${esc(cFilter.q)}" /><div style="display:flex;gap:7px;flex-wrap:wrap">${cats.map(c=>`<button class="chip ${cFilter.cat===c?'on':''}" onclick="setCat('${c}')">${c}</button>`).join("")}</div></div>
    <div class="grid">${cards}</div></div>
    <div class="ticket"><h3>Ticket actual</h3><div class="who">Atiende: ${esc(ME.full_name)}</div>
      <div class="items">${items}</div>
      <div class="ttot"><span style="color:var(--muted);font-size:13px;padding-top:4px">Total</span><span class="n">${money(total)}</span></div>
      <button class="btn" ${lines.length===0?"disabled":""} onclick="doSale()">Registrar venta</button>
      <button class="btn alt" style="margin-top:8px" onclick="openReturn()">Registrar devolución / merma</button>
      <button class="btn alt" style="margin-top:8px" onclick="shareCatalog()">Compartir catálogo</button>
    </div></div>`;
  const s=$("#cSearch"); s.oninput=(e)=>{cFilter.q=e.target.value;const pos=e.target.selectionStart;renderSell();const n=$("#cSearch");n.focus();n.setSelectionRange(pos,pos);};
}
function setCat(c){cFilter.cat=c;renderSell();}
function addT(id){const p=PRODUCTS.find(x=>x.id===id);if(!p)return;if((TICKET[id]||0)>=p.stock)return;TICKET[id]=(TICKET[id]||0)+1;renderSell();}
function subT(id){TICKET[id]=Math.max(0,(TICKET[id]||0)-1);if(!TICKET[id])delete TICKET[id];renderSell();}
async function doSale(){
  const lines=Object.entries(TICKET).filter(([,n])=>n>0).map(([id,qty])=>({product_id:id,qty}));
  if(lines.length===0)return;
  const btn=$("#viewRoot").querySelector('.ticket .btn'); if(btn){btn.disabled=true;btn.textContent="Registrando…";}
  const {data,error}=await sb.rpc("register_sale",{items:lines});
  if(error){ toast(error.message&&error.message.indexOf("insuficiente")>=0?"Stock insuficiente para algún producto":"No se pudo registrar la venta"); if(btn){btn.disabled=false;btn.textContent="Registrar venta";} return; }
  TICKET={}; await refreshProducts(); toast("Venta registrada · "+moneyInline(data.total));
}

/* ================= CATÁLOGO (imágenes) ================= */
function roundRect(x,px,py,w,h,r){x.beginPath();x.moveTo(px+r,py);x.arcTo(px+w,py,px+w,py+h,r);x.arcTo(px+w,py+h,px,py+h,r);x.arcTo(px,py+h,px,py,r);x.arcTo(px,py,px+w,py,r);x.closePath();}
function loadImg(src){return new Promise((res)=>{const im=new Image();im.onload=()=>res(im);im.onerror=()=>res(null);im.src=src;});}
function wrapText(x,text,maxW,maxLines){const words=String(text).split(' ');const lines=[];let cur='';for(const w of words){const t=cur?cur+' '+w:w;if(x.measureText(t).width<=maxW){cur=t;}else{if(cur)lines.push(cur);cur=w;if(lines.length>=maxLines)break;}}if(cur&&lines.length<maxLines)lines.push(cur);if(lines.length>maxLines)lines.length=maxLines;return lines;}
async function buildCatalogImages(prods){
  const perPage=6,pages=[];for(let i=0;i<prods.length;i+=perPage)pages.push(prods.slice(i,i+perPage));
  const out=[];const W=1080,M=48,GAP=24,COLS=2;const cellW=(W-M*2-GAP)/COLS;const imgH=300,txtH=200,cellH=imgH+txtH;
  const d=new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});
  for(let pi=0;pi<pages.length;pi++){
    const items=pages[pi];const rows=Math.ceil(items.length/COLS);const headH=150;const H=headH+rows*cellH+(rows-1)*GAP+110;
    const c=document.createElement('canvas');c.width=W;c.height=H;const x=c.getContext('2d');
    x.fillStyle='#FCF8F6';x.fillRect(0,0,W,H);
    x.save();x.translate(M-6,M-16);x.scale(1.65,1.65);
    x.fillStyle='#B8924F';x.fill(new Path2D('M10 17 L12 10 L15.5 13 L17 8 L18.5 13 L22 10 L24 17 Z'));
    x.beginPath();x.arc(12,9,1.6,0,7);x.fill();x.beginPath();x.arc(17,7,1.6,0,7);x.fill();x.beginPath();x.arc(22,9,1.6,0,7);x.fill();
    x.fillStyle='#6E3B5C';x.fillRect(14,17,6,5);
    x.fillStyle='#F3D2DE';roundRect(x,8,22,18,22,5);x.fill();
    x.fillStyle='#C43E6D';roundRect(x,10.5,28,13,13.5,3);x.fill();
    x.fillStyle='rgba(255,255,255,.45)';x.beginPath();x.ellipse(12.5,34,1.8,5,0,0,7);x.fill();
    x.save();x.translate(38,18);x.rotate(0.21);x.translate(-38,-18);
    x.fillStyle='#B8924F';roundRect(x,36.2,8,3.6,11,1.8);x.fill();
    x.fillStyle='#6E3B5C';x.fillRect(36.4,19,3.2,2);x.fill(new Path2D('M36.5 21 L39.5 21 L38.6 26.5 L37.4 26.5 Z'));
    x.fillStyle='#C43E6D';x.fill(new Path2D('M37.4 26.5 L38.6 26.5 L38 28.5 Z'));x.restore();
    x.fillStyle='#C43E6D';x.fill(new Path2D('M38 30C38 30 34 35 34 38.4a4.3 4.3 0 0 0 8.6 0c0-3.4-4.3-8.4-4.3-8.4Z'));
    x.fillStyle='rgba(255,255,255,.5)';x.beginPath();x.arc(36.3,37.3,1.1,0,7);x.fill();
    x.fillStyle='#B8924F';x.fill(new Path2D('M44 5 l1 2.2 2.2 1 -2.2 1 -1 2.2 -1 -2.2 -2.2 -1 2.2 -1 Z'));x.restore();
    const lx=M+86;
    x.fillStyle='#2A1A2E';x.font='600 54px Fraunces, Georgia, serif';x.fillText('Divas',lx,M+50);
    const wD=x.measureText('Divas ').width;x.fillStyle='#C43E6D';x.font='italic 600 54px Fraunces, Georgia, serif';x.fillText('Nails',lx+wD,M+50);
    x.fillStyle='#8B7683';x.font='400 26px Inter, sans-serif';x.fillText('Catálogo de productos · '+d,lx,M+92);
    if(pages.length>1){const pt='Página '+(pi+1)+' de '+pages.length;x.fillText(pt,W-M-x.measureText(pt).width,M+50);}
    x.strokeStyle='#EAD3DC';x.lineWidth=2;x.beginPath();x.moveTo(M,headH-14);x.lineTo(W-M,headH-14);x.stroke();
    for(let i=0;i<items.length;i++){
      const p=items[i];const col=i%COLS,row=Math.floor(i/COLS);const cx=M+col*(cellW+GAP),cy=headH+row*(cellH+GAP);
      x.fillStyle='#FFFFFF';roundRect(x,cx,cy,cellW,cellH,18);x.fill();x.strokeStyle='#EAD3DC';x.lineWidth=2;roundRect(x,cx,cy,cellW,cellH,18);x.stroke();
      const im=p.img?await loadImg(p.img):null;
      x.save();roundRect(x,cx+14,cy+14,cellW-28,imgH-28,12);x.clip();
      if(im){const aw=cellW-28,ah=imgH-28;const sc=Math.max(aw/im.width,ah/im.height);const dw=im.width*sc,dh=im.height*sc;x.drawImage(im,cx+14+(aw-dw)/2,cy+14+(ah-dh)/2,dw,dh);}
      else{x.fillStyle='#F7E9EE';x.fillRect(cx+14,cy+14,cellW-28,imgH-28);x.font='84px serif';x.textAlign='center';x.fillText('💅',cx+cellW/2,cy+imgH/2+26);x.textAlign='left';}
      x.restore();
      x.fillStyle='#2A1A2E';x.font='500 27px Inter, sans-serif';const wl=wrapText(x,p.name,cellW-40,2);wl.forEach((ln,li)=>x.fillText(ln,cx+20,cy+imgH+32+li*34));
      x.fillStyle='#A62B57';x.font='600 33px Fraunces, Georgia, serif';x.fillText(cup(p.price),cx+20,cy+imgH+124);
      const u=usdOf(p.price);if(u!=null){x.fillStyle='#8B7683';x.font='400 22px Inter, sans-serif';x.fillText('≈ $'+fmt(u)+' USD',cx+20,cy+imgH+152);}
      const z=zelleOf(p.price);if(z!=null){x.fillStyle='#B8924F';x.font='600 22px Inter, sans-serif';x.fillText('≈ $'+fmt(z)+' Zelle',cx+20,cy+imgH+180);}
      x.fillStyle='#4E8D6E';x.font='600 21px Inter, sans-serif';const tag='● Disponible';x.fillText(tag,cx+cellW-20-x.measureText(tag).width,cy+cellH-20);
    }
    x.fillStyle='#8B7683';x.font='400 24px Inter, sans-serif';x.fillText('Precios en CUP · equivalente en USD según la tasa del día',M,H-40);
    out.push(c.toDataURL('image/jpeg',0.85));
  }
  return out;
}
async function shareCatalog(){
  const prods=PRODUCTS.filter(p=>p.stock>0);
  if(prods.length===0){toast('No hay productos en stock para el catálogo');return;}
  toast('Generando catálogo…');
  let urls=[]; try{ urls=await buildCatalogImages(prods);}catch(err){ toast('No se pudo generar el catálogo'); return; }
  const files=[];
  try{ for(let i=0;i<urls.length;i++){const blob=await (await fetch(urls[i])).blob();files.push(new File([blob],'divas-catalogo-'+(i+1)+'.jpg',{type:'image/jpeg'}));} if(navigator.canShare&&navigator.canShare({files})){await navigator.share({files,title:'Catálogo Divas Nails'});return;} }catch(err){ if(err&&err.name==='AbortError')return; }
  urls.forEach((u,i)=>{const a=document.createElement('a');a.href=u;a.download='divas-catalogo-'+(i+1)+'.jpg';a.click();});
  toast('Catálogo descargado ('+urls.length+' imagen'+(urls.length>1?'es':'')+')');
}

if('serviceWorker' in navigator && location.protocol==='https:'){ navigator.serviceWorker.register('./sw.js').catch(function(err){}); }
