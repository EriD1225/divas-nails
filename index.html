<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#C43E6D" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Divas Nails" />

<title>Divas Nails · Inventario</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#FCF8F6; --ink:#2A1A2E; --plum:#6E3B5C; --lacquer:#C43E6D; --lacquerDeep:#A62B57;
    --blush:#F7E9EE; --line:#EAD3DC; --champ:#B8924F; --ok:#4E8D6E; --warn:#C9743B;
    --muted:#8B7683; --white:#fff;
    --f-disp:'Fraunces',Georgia,'Times New Roman',serif; --f-body:'Inter',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--f-body);-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}
  .hidden{display:none!important}
  .disp{font-family:var(--f-disp)}
  .m-cup{display:block}
  .m-usd{display:block;font-size:.74em;color:var(--muted);font-weight:400}

  #gate{min-height:100vh;min-height:100dvh;display:grid;place-items:center;padding:24px}
  .card{background:var(--white);border:1px solid var(--line);border-radius:20px;padding:30px 26px;width:100%;max-width:420px;box-shadow:0 20px 50px -30px rgba(110,59,92,.5)}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .brand .name{font-family:var(--f-disp);font-size:28px;font-weight:600;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:14px;margin:0 0 22px}
  .rolerow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .rolebtn{text-align:left;background:var(--white);border:1px solid var(--line);border-radius:16px;padding:18px}
  .rolebtn:hover{border-color:var(--lacquer)}
  .rolebtn .ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;margin-bottom:12px}
  .rolebtn .t{font-family:var(--f-disp);font-size:17px;font-weight:600}
  .rolebtn .d{font-size:12.5px;color:var(--muted);margin-top:4px;line-height:1.45}
  label.fld{display:block;font-size:12.5px;color:var(--plum);font-weight:500;margin:14px 0 6px}
  .in{width:100%;border:1px solid var(--line);border-radius:11px;padding:12px 13px;font-size:15px;color:var(--ink);background:var(--white);outline:none}
  .in:focus{border-color:var(--lacquer)}
  .btn{background:var(--lacquer);color:#fff;border:none;border-radius:11px;padding:13px 16px;font-size:14.5px;font-weight:600;width:100%}
  .btn:hover{background:var(--lacquerDeep)}
  .btn[disabled]{opacity:.5;cursor:not-allowed}
  .btn.alt{background:transparent;color:var(--plum);border:1px solid var(--line)}
  .err{color:#B0342F;font-size:13px;margin-top:10px;min-height:16px}
  .link{background:none;border:none;color:var(--muted);font-size:12.5px;text-decoration:underline;margin-top:12px;padding:0}

  #app{min-height:100vh;min-height:100dvh}
  .top{position:sticky;top:0;z-index:20;background:rgba(252,248,246,.92);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .top .row{max-width:1080px;margin:0 auto;padding:11px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .pill{font-size:12px;color:var(--plum);background:var(--blush);border-radius:999px;padding:3px 10px}
  .off{font-size:11px;color:var(--ok);display:inline-flex;align-items:center;gap:5px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);display:inline-block}
  .ghost{background:transparent;color:var(--plum);border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:13px}
  .wrap{max-width:1080px;margin:0 auto;padding:20px 18px 70px}
  .tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .tab{padding:9px 15px;border-radius:999px;border:none;font-size:14px;font-weight:500;background:transparent;color:var(--plum)}
  .tab.on{background:var(--ink);color:#fff}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
  .kpi{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:16px;position:relative;overflow:hidden}
  .kpi .bar{position:absolute;left:0;top:0;bottom:0;width:4px}
  .kpi .lab{font-size:12px;color:var(--muted);margin-bottom:7px}
  .kpi .val{font-family:var(--f-disp);font-size:22px;font-weight:600}
  .cols{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;align-items:start}
  .panel{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:18px}
  .panel h3{font-family:var(--f-disp);font-weight:600;font-size:16px;margin:0 0 12px;display:flex;justify-content:space-between;align-items:baseline}
  .empty{color:var(--muted);font-size:13.5px;text-align:center;padding:22px 0;line-height:1.55}
  .feed .it{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--blush)}
  .feed .it:last-child{border-bottom:none}
  .feed .desc{font-size:14px;font-weight:500}
  .feed .meta{font-size:12px;color:var(--muted);margin-top:3px}
  .feed .amt{font-family:var(--f-disp);font-weight:600;color:var(--lacquerDeep);white-space:nowrap;margin-left:12px;text-align:right}
  .lowrow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--blush);font-size:13.5px}
  .lowrow:last-child{border-bottom:none}
  .lowrow .n{color:var(--warn);font-weight:600}

  .tblwrap{background:var(--white);border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .thead,.trow{display:grid;grid-template-columns:2.4fr 1fr 1fr 1.6fr;align-items:center}
  .thead{padding:12px 18px;background:var(--blush);font-size:12px;font-weight:600;color:var(--plum)}
  .trow{padding:12px 18px;border-top:1px solid var(--blush)}
  .trow .pn{font-size:14px;font-weight:500}
  .pnrow{display:flex;align-items:center;gap:10px}
  .thumb{width:42px;height:42px;border-radius:9px;object-fit:cover;background:var(--blush);flex:none;border:1px solid var(--line)}
  .thumb.ph{display:grid;place-items:center;color:var(--muted);font-size:15px}
  .cat{font-size:12px;padding:3px 9px;background:var(--blush);border-radius:999px;color:var(--plum);display:inline-block}
  .step{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--white);font-size:15px;color:var(--plum);line-height:1}
  .stepn{min-width:30px;text-align:center;font-family:var(--f-disp);font-weight:600}
  .stk{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .bar-actions{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px}
  .mini{font-size:13.5px;color:var(--muted)}
  .btn-sm{background:var(--lacquer);color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:13.5px;font-weight:600}
  .btn-sm.alt{background:transparent;color:var(--plum);border:1px solid var(--line)}
  .addform{background:var(--white);border:1px solid var(--line);border-radius:16px 16px 0 0;padding:16px;display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr auto;gap:9px;align-items:center}
  .addform2{background:var(--white);border:1px solid var(--line);border-top:none;border-radius:0 0 16px 16px;padding:0 16px 16px;margin-bottom:14px;display:flex;gap:10px;align-items:center;font-size:13px;color:var(--muted)}
  .addform .in{padding:9px 10px;font-size:13.5px}
  .badge{font-size:11px;padding:2px 9px;border-radius:999px;display:inline-block;font-weight:600}
  .b-def{background:#F7E0E4;color:#A62B57}
  .b-mer{background:#F3E7D4;color:#8a6516}
  .b-otr{background:var(--blush);color:var(--plum)}

  .clerk{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start}
  .filters{display:flex;gap:9px;margin-bottom:14px;flex-wrap:wrap}
  .chip{border:1px solid var(--line);background:var(--white);color:var(--plum);border-radius:999px;padding:7px 12px;font-size:12.5px}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px}
  .prod{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:14px}
  .prod.sel{border-color:var(--lacquer)}
  .prodimg{width:100%;height:104px;border-radius:10px;object-fit:cover;background:var(--blush);margin-bottom:8px;display:block;border:1px solid var(--line)}
  .prod .pn{font-size:14px;font-weight:500;min-height:38px;line-height:1.35}
  .prod .meta{display:flex;justify-content:space-between;align-items:flex-start;margin-top:8px;gap:8px}
  .prod .price{font-family:var(--f-disp);font-weight:600;color:var(--lacquerDeep);font-size:14px}
  .prod .qty{font-size:11.5px;color:var(--muted);white-space:nowrap;padding-top:2px}
  .prod .sell{background:var(--lacquer);color:#fff;border:none;border-radius:9px;padding:9px;font-size:13.5px;font-weight:600;width:100%;margin-top:10px}
  .prod .stepper{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
  .ticket{position:sticky;top:74px;background:var(--white);border:1px solid var(--line);border-radius:16px;padding:18px;display:flex;flex-direction:column;max-height:82vh;max-height:82dvh}
  .ticket h3{font-family:var(--f-disp);font-weight:600;font-size:17px;margin:0}
  .ticket .who{font-size:12px;color:var(--muted);margin:2px 0 12px}
  .ticket .items{flex:1;overflow-y:auto}
  .titem{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--blush);font-size:13.5px;gap:8px}
  .ttot{display:flex;justify-content:space-between;align-items:flex-start;margin:14px 0 12px;gap:8px}
  .ttot .n{font-family:var(--f-disp);font-weight:600;font-size:20px;text-align:right}

  .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .ratebox{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:999px;font-size:14px;font-weight:500;box-shadow:0 12px 30px -8px rgba(0,0,0,.4);z-index:60;opacity:0;transition:opacity .2s;max-width:90vw;text-align:center}
  .toast.show{opacity:1}
  @media (max-width:820px){
    .kpis{grid-template-columns:1fr 1fr}
    .cols,.clerk,.settings-grid{grid-template-columns:1fr}
    .ticket{position:static;max-height:none;order:-1}
    .addform{grid-template-columns:1fr 1fr}
    .thead,.trow{grid-template-columns:1.7fr 1fr 1.5fr;font-size:13px}
    .thead span:nth-child(3),.trow > div:nth-child(3){display:none}
  }
  .shareov{position:fixed;inset:0;background:rgba(42,26,46,.5);display:flex;align-items:center;justify-content:center;padding:20px;z-index:80}
  .sharebox{background:var(--white);border-radius:18px;padding:22px;width:100%;max-width:440px;box-shadow:0 20px 50px -20px rgba(0,0,0,.4);max-height:90vh;max-height:90dvh;overflow-y:auto}
  .sharetxt{width:100%;height:220px;border:1px solid var(--line);border-radius:12px;padding:12px;font-size:12.5px;font-family:ui-monospace,monospace;color:var(--ink);background:var(--bg);resize:none;outline:none}
  .mform label{display:block;font-size:12.5px;color:var(--plum);font-weight:500;margin:12px 0 6px}
  .mform textarea{width:100%;min-height:80px;border:1px solid var(--line);border-radius:11px;padding:11px;font-size:14px;color:var(--ink);background:var(--white);outline:none;resize:vertical}
</style>
</head>
<body>

<section id="gate"><div class="card" id="gateCard"></div></section>

<section id="app" class="hidden">
  <div class="top"><div class="row">
    <div style="display:flex;align-items:center;gap:9px">
      <svg width="25" height="25" viewBox="0 0 48 48"><defs><linearGradient id="lgd2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C43E6D"/><stop offset="1" stop-color="#A62B57"/></linearGradient></defs><path d="M10 17 L12 10 L15.5 13 L17 8 L18.5 13 L22 10 L24 17 Z" fill="#B8924F"/><circle cx="12" cy="9" r="1.6" fill="#B8924F"/><circle cx="17" cy="7" r="1.6" fill="#B8924F"/><circle cx="22" cy="9" r="1.6" fill="#B8924F"/><rect x="14" y="17" width="6" height="5" fill="#6E3B5C"/><rect x="8" y="22" width="18" height="22" rx="5" fill="#F3D2DE"/><rect x="10.5" y="28" width="13" height="13.5" rx="3" fill="url(#lgd2)"/><ellipse cx="12.5" cy="34" rx="1.8" ry="5" fill="#fff" opacity=".45"/><g transform="rotate(12 38 18)"><rect x="36.2" y="8" width="3.6" height="11" rx="1.8" fill="#B8924F"/><rect x="36.4" y="19" width="3.2" height="2" fill="#6E3B5C"/><path d="M36.5 21 L39.5 21 L38.6 26.5 L37.4 26.5 Z" fill="#6E3B5C"/><path d="M37.4 26.5 L38.6 26.5 L38 28.5 Z" fill="#C43E6D"/></g><path d="M38 30C38 30 34 35 34 38.4a4.3 4.3 0 0 0 8.6 0c0-3.4-4.3-8.4-4.3-8.4Z" fill="url(#lgd2)"/><circle cx="36.3" cy="37.3" r="1.1" fill="#fff" opacity=".5"/><path d="M44 5 l1 2.2 2.2 1 -2.2 1 -1 2.2 -1 -2.2 -2.2 -1 2.2 -1 Z" fill="#B8924F"/></svg>
      <span class="disp" style="font-size:21px;font-weight:600;letter-spacing:-.02em">Divas <i style="color:var(--lacquer)">Nails</i></span>
      <span class="pill" id="rolePill">—</span>
      <span class="off"><span class="dot"></span>sin conexión</span>
    </div>
    <button class="ghost" id="exitBtn">Cambiar</button>
  </div></div>
  <div class="wrap" id="viewRoot"></div>
</section>

<div class="toast" id="toast"></div>

<script>
const $ = (s)=>document.querySelector(s);
const fmt = (n)=>(Number(n)||0).toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2});
const esc = (s)=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const timeStr = (iso)=>new Date(iso).toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});
const isToday = (iso)=>{const d=new Date(iso),t=new Date();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate();};
const uid = ()=>"x"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2600);}

/* ---- moneda ---- */
function rate(){ return Number(getSettings().usdRate)||0; }
function cup(n){ return fmt(n)+" CUP"; }
function usdOf(n){ const r=rate(); return r>0 ? n/r : null; }
function money(n){ const u=usdOf(n); return `<span class="m-cup">${cup(n)}</span>${u!=null?`<span class="m-usd">≈ $${fmt(u)}</span>`:""}`; }
function moneyInline(n){ const u=usdOf(n); return cup(n)+(u!=null?` (≈ $${fmt(u)})`:""); }
function moneyMsg(n){ const u=usdOf(n); return cup(n)+(u!=null?` (≈ $${fmt(u)})`:""); }

/* ---- imagen: comprime a ~320px jpeg para que ocupe poco ---- */
function compressImage(file,maxSize,quality){return new Promise((res,rej)=>{const rd=new FileReader();rd.onload=()=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;if(w>h){if(w>maxSize){h=Math.round(h*maxSize/w);w=maxSize;}}else{if(h>maxSize){w=Math.round(w*maxSize/h);h=maxSize;}}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',quality));};img.onerror=rej;img.src=rd.result;};rd.onerror=rej;rd.readAsDataURL(file);});}

const SEED=[
  {id:uid(),name:"Esmalte semiperm. rojo carmín",category:"Esmaltes",price:1200,cost:480,stock:24,min:6,img:null},
  {id:uid(),name:"Esmalte semiperm. nude",category:"Esmaltes",price:1200,cost:480,stock:18,min:6,img:null},
  {id:uid(),name:"Esmalte semiperm. coral",category:"Esmaltes",price:1200,cost:480,stock:3,min:6,img:null},
  {id:uid(),name:"Top coat brillo espejo",category:"Esmaltes",price:1350,cost:560,stock:12,min:4,img:null},
  {id:uid(),name:"Base coat protectora",category:"Esmaltes",price:1350,cost:560,stock:10,min:4,img:null},
  {id:uid(),name:"Lima profesional 100/180",category:"Herramientas",price:250,cost:90,stock:40,min:10,img:null},
  {id:uid(),name:"Pulidor de uñas 4 caras",category:"Herramientas",price:350,cost:130,stock:15,min:5,img:null},
  {id:uid(),name:"Acetona pura 500 ml",category:"Cuidado",price:800,cost:320,stock:9,min:4,img:null},
  {id:uid(),name:"Aceite de cutículas",category:"Cuidado",price:950,cost:380,stock:14,min:5,img:null},
  {id:uid(),name:"Crema de manos nutritiva",category:"Cuidado",price:780,cost:300,stock:20,min:6,img:null},
  {id:uid(),name:"Kit gel UV starter",category:"Kits",price:6500,cost:3200,stock:5,min:2,img:null},
  {id:uid(),name:"Guantes nitrilo (caja 100)",category:"Higiene",price:1100,cost:520,stock:4,min:3,img:null},
];
const CATS=["Esmaltes","Herramientas","Cuidado","Kits","Higiene"];

const DB={
  get(k,def){try{const v=localStorage.getItem("lacca_"+k);return v?JSON.parse(v):def;}catch(err){return def;}},
  set(k,v){try{localStorage.setItem("lacca_"+k,JSON.stringify(v));return true;}catch(err){toast("Espacio lleno: revisa las imágenes o haz una copia");return false;}},
};
function getProducts(){return DB.get("products",null);}
function saveProducts(p){DB.set("products",p);}
function getSales(){return DB.get("sales",[]);}
function saveSales(s){DB.set("sales",s);}
function getReturns(){return DB.get("returns",[]);}
function saveReturns(r){DB.set("returns",r);}
function getSettings(){return DB.get("settings",{pin:null,usdRate:420,usdRateDate:null});}
function saveSettings(s){DB.set("settings",s);}
if(getProducts()===null){ saveProducts(SEED); }

/* ================= RESUMEN PARA WHATSAPP ================= */
function buildSummaryText(){
  const sales=getSales().filter(s=>isToday(s.ts));
  const prods=getProducts();
  const rets=getReturns().filter(r=>isToday(r.ts));
  const rev=sales.reduce((a,s)=>a+s.total,0);
  const units=sales.reduce((a,s)=>a+s.units,0);
  const byProd={};
  sales.forEach(s=>s.lines.forEach(l=>{ if(!byProd[l.name])byProd[l.name]={qty:0,total:0}; byProd[l.name].qty+=l.qty; byProd[l.name].total+=l.total; }));
  const items=Object.entries(byProd).sort((a,b)=>b[1].total-a[1].total);
  const top=items[0];
  const low=prods.filter(p=>p.stock<=p.min);
  const d=new Date().toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"numeric"});

  let t=`👑 *DIVAS NAILS · Resumen del ${d}*\n`;
  t+=`━━━━━━━━━━━━━━━\n\n`;
  t+=`💰 *Ingresos del día:* *${moneyMsg(rev)}*\n`;
  t+=`🧾 Ventas: *${sales.length}*   ·   Unidades: *${units}*\n`;
  if(top) t+=`⭐ Más vendido: *${top[0]}* (${top[1].qty} uds.)\n`;
  t+=`\n📦 *PRODUCTOS VENDIDOS HOY*\n`;
  if(items.length===0){ t+=`_Sin ventas hoy_\n`; }
  else items.forEach(([name,v])=>{
    const unit=v.qty>0? v.total/v.qty : 0;
    t+=`• *${name}*\n   ${v.qty} × ${cup(unit)} = *${moneyMsg(v.total)}*\n`;
  });
  if(rets.length){
    t+=`\n🔁 *DEVOLUCIONES / MERMAS DE HOY*\n`;
    rets.forEach(r=>{ t+=`• *${r.productName}* — ${r.qty} uds. (${r.reason})${r.note?`\n   "${r.note}"`:''} — ${r.seller}\n`; });
  }
  if(low.length){ t+=`\n⚠️ *Reponer pronto:* ${low.map(p=>`${p.name} (${p.stock})`).join(", ")}\n`; }
  t+=`\n_Enviado desde Divas Nails_ 🌸👑`;
  return t;
}
function overlayShare(title,text){
  const ov=document.createElement('div'); ov.className='shareov';

/* ================= CATÁLOGO PARA CLIENTES (imágenes) ================= */
function roundRect(x,px,py,w,h,r){x.beginPath();x.moveTo(px+r,py);x.arcTo(px+w,py,px+w,py+h,r);x.arcTo(px+w,py+h,px,py+h,r);x.arcTo(px,py+h,px,py,r);x.arcTo(px,py,px+w,py,r);x.closePath();}
function loadImg(src){return new Promise((res)=>{const im=new Image();im.onload=()=>res(im);im.onerror=()=>res(null);im.src=src;});}
function wrapText(x,text,maxW,maxLines){const words=String(text).split(' ');const lines=[];let cur='';for(const w of words){const t=cur?cur+' '+w:w;if(x.measureText(t).width<=maxW){cur=t;}else{if(cur)lines.push(cur);cur=w;if(lines.length>=maxLines)break;}}if(cur&&lines.length<maxLines)lines.push(cur);if(lines.length>maxLines)lines.length=maxLines;const joined=lines.join(' ');if(joined.length<String(text).length&&lines.length===maxLines){let last=lines[maxLines-1];while(last.length>1&&x.measureText(last+'…').width>maxW)last=last.slice(0,-1);lines[maxLines-1]=last+'…';}return lines;}

async function buildCatalogImages(prods){
  const perPage=6, pages=[];
  for(let i=0;i<prods.length;i+=perPage)pages.push(prods.slice(i,i+perPage));
  const out=[];
  const W=1080,M=48,GAP=24,COLS=2;
  const cellW=(W-M*2-GAP)/COLS;
  const imgH=300, txtH=175, cellH=imgH+txtH;
  const d=new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});
  for(let pi=0;pi<pages.length;pi++){
    const items=pages[pi];
    const rows=Math.ceil(items.length/COLS);
    const headH=150;
    const H=headH+rows*cellH+(rows-1)*GAP+110;
    const c=document.createElement('canvas');c.width=W;c.height=H;const x=c.getContext('2d');
    x.fillStyle='#FCF8F6';x.fillRect(0,0,W,H);
    x.save();x.translate(M-6,M-16);x.scale(1.65,1.65);
    x.fillStyle='#B8924F';x.fill(new Path2D('M10 17 L12 10 L15.5 13 L17 8 L18.5 13 L22 10 L24 17 Z'));
    x.beginPath();x.arc(12,9,1.6,0,7);x.fill();x.beginPath();x.arc(17,7,1.6,0,7);x.fill();x.beginPath();x.arc(22,9,1.6,0,7);x.fill();
    x.fillStyle='#6E3B5C';x.fillRect(14,17,6,5);
    x.fillStyle='#F3D2DE';roundRect(x,8,22,18,22,5);x.fill();
    x.fillStyle='#C43E6D';roundRect(x,10.5,28,13,13.5,3);x.fill();
    x.fillStyle='rgba(255,255,255,.45)';x.beginPath();x.ellipse(12.5,34,1.8,5,0,0,7);x.fill();
    x.save();x.translate(38,18);x.rotate(0.21);x.translate(-38,-18);
    x.fillStyle='#B8924F';roundRect(x,36.2,8,3.6,11,1.8);x.fill();
    x.fillStyle='#6E3B5C';x.fillRect(36.4,19,3.2,2);
    x.fill(new Path2D('M36.5 21 L39.5 21 L38.6 26.5 L37.4 26.5 Z'));
    x.fillStyle='#C43E6D';x.fill(new Path2D('M37.4 26.5 L38.6 26.5 L38 28.5 Z'));
    x.restore();
    x.fillStyle='#C43E6D';x.fill(new Path2D('M38 30C38 30 34 35 34 38.4a4.3 4.3 0 0 0 8.6 0c0-3.4-4.3-8.4-4.3-8.4Z'));
    x.fillStyle='rgba(255,255,255,.5)';x.beginPath();x.arc(36.3,37.3,1.1,0,7);x.fill();
    x.fillStyle='#B8924F';x.fill(new Path2D('M44 5 l1 2.2 2.2 1 -2.2 1 -1 2.2 -1 -2.2 -2.2 -1 2.2 -1 Z'));
    x.restore();
    const lx=M+86;
    x.fillStyle='#2A1A2E';x.font='600 54px Fraunces, Georgia, serif';
    x.fillText('Divas',lx,M+50);
    const wD=x.measureText('Divas ').width;
    x.fillStyle='#C43E6D';x.font='italic 600 54px Fraunces, Georgia, serif';
    x.fillText('Nails',lx+wD,M+50);
    x.fillStyle='#8B7683';x.font='400 26px Inter, sans-serif';
    x.fillText('Catálogo de productos · '+d,lx,M+92);
    if(pages.length>1){const pt='Página '+(pi+1)+' de '+pages.length;x.fillText(pt,W-M-x.measureText(pt).width,M+52);}
    x.strokeStyle='#EAD3DC';x.lineWidth=2;x.beginPath();x.moveTo(M,headH-14);x.lineTo(W-M,headH-14);x.stroke();
    for(let i=0;i<items.length;i++){
      const p=items[i];const col=i%COLS,row=Math.floor(i/COLS);
      const cx=M+col*(cellW+GAP), cy=headH+row*(cellH+GAP);
      x.fillStyle='#FFFFFF';roundRect(x,cx,cy,cellW,cellH,18);x.fill();
      x.strokeStyle='#EAD3DC';x.lineWidth=2;roundRect(x,cx,cy,cellW,cellH,18);x.stroke();
      const im=p.img?await loadImg(p.img):null;
      x.save();roundRect(x,cx+14,cy+14,cellW-28,imgH-28,12);x.clip();
      if(im){
        const aw=cellW-28, ah=imgH-28;
        const s=Math.max(aw/im.width,ah/im.height);
        const dw=im.width*s,dh=im.height*s;
        x.drawImage(im,cx+14+(aw-dw)/2,cy+14+(ah-dh)/2,dw,dh);
      }else{
        x.fillStyle='#F7E9EE';x.fillRect(cx+14,cy+14,cellW-28,imgH-28);
        x.font='84px serif';x.textAlign='center';x.fillText('💅',cx+cellW/2,cy+imgH/2+26);x.textAlign='left';
      }
      x.restore();
      x.fillStyle='#2A1A2E';x.font='500 27px Inter, sans-serif';
      const lines=wrapText(x,p.name,cellW-40,2);
      lines.forEach((ln,li)=>x.fillText(ln,cx+20,cy+imgH+32+li*34));
      x.fillStyle='#A62B57';x.font='600 33px Fraunces, Georgia, serif';
      x.fillText(cup(p.price),cx+20,cy+imgH+124);
      const u=usdOf(p.price);
      if(u!=null){x.fillStyle='#8B7683';x.font='400 24px Inter, sans-serif';x.fillText('≈ $'+fmt(u),cx+20,cy+imgH+156);}
      x.fillStyle='#4E8D6E';x.font='600 22px Inter, sans-serif';
      const tag='● Disponible';x.fillText(tag,cx+cellW-20-x.measureText(tag).width,cy+cellH-22);
    }
    x.fillStyle='#8B7683';x.font='400 24px Inter, sans-serif';
    x.fillText('Precios en CUP · equivalente en USD según la tasa del día',M,H-40);
    out.push(c.toDataURL('image/jpeg',0.85));
  }
  return out;
}

async function shareCatalog(){
  const prods=getProducts().filter(p=>p.stock>0);
  if(prods.length===0){toast('No hay productos en stock para el catálogo');return;}
  toast('Generando catálogo…');
  let urls=[];
  try{ urls=await buildCatalogImages(prods); }catch(err){ toast('No se pudo generar el catálogo'); return; }
  const files=[];
  try{
    for(let i=0;i<urls.length;i++){
      const blob=await (await fetch(urls[i])).blob();
      files.push(new File([blob],'divas-catalogo-'+(i+1)+'.jpg',{type:'image/jpeg'}));
    }
    if(navigator.canShare && navigator.canShare({files})){ await navigator.share({files,title:'Catálogo Divas Nails'}); return; }
  }catch(e){ if(e && e.name==='AbortError') return; }
  urls.forEach((u,i)=>{const a=document.createElement('a');a.href=u;a.download='divas-catalogo-'+(i+1)+'.jpg';a.click();});
  toast('Catálogo descargado ('+urls.length+' imagen'+(urls.length>1?'es':'')+'). Adjúntalo al chat del cliente');
}

  <button class="tab ${a==='inv'?'on':''}" onclick="renderInv()">Inventario</button>

</div>`;}

function renderOwner(){
  const sales=getSales(), prods=getProducts();
  const today=sales.filter(s=>isToday(s.ts));
  const rev=today.reduce((a,s)=>a+s.total,0);
  const units=today.reduce((a,s)=>a+s.units,0);
  const avg=today.length?rev/today.length:0;
  const low=prods.filter(p=>p.stock<=p.min);
  const retsToday=getReturns().filter(r=>isToday(r.ts));
  const counter={}; today.forEach(s=>s.lines.forEach(l=>counter[l.name]=(counter[l.name]||0)+l.qty));
  const top=Object.entries(counter).sort((a,b)=>b[1]-a[1])[0];
  const noRate = rate()<=0;
  const feed=today.length===0?`<div class="empty">Aún no hay ventas hoy. Cuando se registre una, aparece aquí.</div>`
    :today.slice().reverse().slice(0,14).map(s=>`<div class="it"><div><div class="desc">${s.lines.map(l=>esc(l.qty+"× "+l.name)).join(" · ")}</div><div class="meta">${timeStr(s.ts)} · ${esc(s.seller||"Mostrador")}</div></div><div class="amt">${money(s.total)}</div></div>`).join("");
  const lowHtml=low.length===0?`<div class="empty">Todo el stock por encima del mínimo.</div>`
    :low.map(p=>`<div class="lowrow"><span>${esc(p.name)}</span><span class="n">${p.stock} uds.</span></div>`).join("");
  $("#viewRoot").innerHTML=ownerTabs('res')+
    (noRate?`<div class="panel" style="margin-bottom:16px;border-color:var(--warn)"><div style="font-size:13.5px;color:var(--warn)">Aún no has puesto la <b>tasa del día (USD)</b>. Ve a <b>Ajustes</b> para ver también los precios en dólares.</div></div>`:``)+`
    <div class="kpis">
      <div class="kpi"><div class="bar" style="background:var(--lacquer)"></div><div class="lab">Ingresos hoy</div><div class="val">${money(rev)}</div></div>
      <div class="kpi"><div class="bar" style="background:var(--plum)"></div><div class="lab">Unidades vendidas</div><div class="val">${units}</div></div>
      <div class="kpi"><div class="bar" style="background:var(--champ)"></div><div class="lab">Ticket promedio</div><div class="val">${money(avg)}</div></div>
      <div class="kpi"><div class="bar" style="background:${retsToday.length?'var(--warn)':'var(--ok)'}"></div><div class="lab">Devol./mermas hoy</div><div class="val">${retsToday.length}</div></div>
    </div>
    <div class="cols">
      <div class="panel feed"><h3>Ventas de hoy</h3>${feed}</div>
      <div style="display:flex;flex-direction:column;gap:16px">
        <div class="panel"><h3>Lo más vendido hoy</h3>${top?`<div class="disp" style="font-size:20px;font-weight:600">${esc(top[0])}</div><div style="color:var(--muted);font-size:13px;margin-top:4px">${top[1]} unidades</div>`:`<div class="empty">Sin datos todavía.</div>`}</div>
        <div class="panel"><h3>Reponer pronto</h3>${lowHtml}</div>
      </div>
    </div>`;
}

  $("#viewRoot").innerHTML=ownerTabs('inv')+`
    <div class="bar-actions"><div class="mini">Valor del stock (a coste): <b style="color:var(--ink)">${moneyInline(totalCost)}</b> · ${prods.length} referencias</div>
      <div style="display:flex;gap:8px"><button class="btn-sm alt" onclick="shareCatalog()">Compartir catálogo</button><button class="btn-sm" onclick="toggleAdd()">＋ Añadir producto</button></div></div>
    <div id="addSlot"></div>
    <div class="tblwrap"><div class="thead"><span>Producto</span><span>Precio (CUP)</span><span>Categoría</span><span>Stock</span></div>${rows}</div>`;
}
function toggleAdd(){
  const slot=$("#addSlot"); if(slot.innerHTML){slot.innerHTML="";return;}
  slot.innerHTML=`<div class="addform">
    <input class="in" id="np_name" placeholder="Nombre del producto" />
    <select class="in" id="np_cat">${CATS.map(c=>`<option>${c}</option>`).join("")}</select>
    <input class="in" id="np_price" type="number" step="0.01" placeholder="Precio (CUP)" />
    <input class="in" id="np_cost" type="number" step="0.01" placeholder="Coste (CUP)" />
    <input class="in" id="np_stock" type="number" placeholder="Stock" />
    <button class="btn-sm" onclick="saveProd()">Guardar</button></div>
    <div class="addform2"><span>Imagen (opcional):</span><input id="np_img" type="file" accept="image/*" /></div>`;
}
async function saveProd(){
  const name=$("#np_name").value.trim(); if(!name){toast("Ponle un nombre.");return;}
  let img=null; const fi=$("#np_img"); const f=fi&&fi.files[0];
  if(f){ try{ img=await compressImage(f,320,0.7);}catch(err){ toast("No se pudo leer la imagen"); } }
  const prods=getProducts();
  prods.unshift({id:uid(),name,category:$("#np_cat").value,price:parseFloat($("#np_price").value)||0,cost:parseFloat($("#np_cost").value)||0,stock:parseInt($("#np_stock").value)||0,min:3,img});
  saveProducts(prods); renderInv(); toast("Producto añadido");
}
function pickImage(id){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=async()=>{ const f=inp.files[0]; if(!f)return; try{ const data=await compressImage(f,320,0.7); const prods=getProducts(); const p=prods.find(x=>x.id===id); if(!p)return; p.img=data; saveProducts(prods); renderInv(); toast('Imagen añadida'); }catch(err){ toast('No se pudo leer la imagen'); } };
  inp.click();
}
function adjust(id,d){const prods=getProducts();const p=prods.find(x=>x.id===id);if(!p)return;p.stock=Math.max(0,p.stock+d);saveProducts(prods);renderInv();}
function delProd(id){if(!confirm("¿Eliminar este producto del inventario?"))return;saveProducts(getProducts().filter(p=>p.id!==id));renderInv();toast("Producto eliminado");}

function renderReturns(){
  const arr=getReturns().slice().reverse();
  const rows = arr.length===0 ? `<div class="empty" style="padding:26px">Sin devoluciones ni mermas registradas.</div>` :
    arr.map(r=>{
      const bcls=r.reason==='Defecto'?'b-def':r.reason==='Merma'?'b-mer':'b-otr';
      return `<div class="trow" style="grid-template-columns:2fr 2.6fr 0.6fr;align-items:start">
        <div><div class="pn">${esc(r.productName)}</div><div style="font-size:12px;color:var(--muted);margin-top:3px">${new Date(r.ts).toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit"})} ${timeStr(r.ts)} · ${esc(r.seller)}</div></div>
        <div style="font-size:13.5px"><span class="badge ${bcls}">${r.reason}</span> <b>${r.qty} uds.</b>${r.note?`<div style="color:var(--plum);margin-top:5px;line-height:1.45">"${esc(r.note)}"</div>`:''}</div>
        <div style="text-align:right"><button class="step" style="color:var(--warn)" onclick="delReturn('${r.id}')">✕</button></div>
      </div>`;
    }).join("");
  $("#viewRoot").innerHTML=ownerTabs('dev')+`
    <div class="bar-actions"><div class="mini">Récord de devoluciones y mermas · ${getReturns().length} registro(s). Sale también en el reporte del día.</div>
      <button class="btn-sm" onclick="openReturn()">＋ Registrar</button></div>
    <div class="tblwrap"><div class="thead" style="grid-template-columns:2fr 2.6fr 0.6fr"><span>Producto</span><span>Motivo y nota</span><span></span></div>${rows}</div>`;
}
function delReturn(id){ if(!confirm("¿Eliminar este registro del historial? (No devuelve el stock)"))return; saveReturns(getReturns().filter(r=>r.id!==id)); renderReturns(); toast("Registro eliminado"); }

function renderSettings(){
  const set=getSettings(); const sales=getSales();
  const rateInfo = set.usdRate>0
    ? `Tasa actual: <b style="color:var(--ink)">1 USD = ${fmt(set.usdRate)} CUP</b>${set.usdRateDate?` · puesta el ${new Date(set.usdRateDate).toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit"})}`:""}`
    : `Aún no has puesto la tasa de hoy.`;
  $("#viewRoot").innerHTML=ownerTabs('set')+`
    <div class="panel" style="margin-bottom:16px">
      <h3>Tasa del día · USD</h3>
      <p style="font-size:13.5px;color:var(--plum);line-height:1.6;margin-top:0">Escribe cuántos CUP vale hoy 1 USD. Los precios siguen en CUP y debajo se muestra el equivalente en dólares. Actualízala cada día.</p>
      <div class="mini" style="margin-bottom:10px">${rateInfo}</div>
      <div class="ratebox">
        <div><label class="fld" style="margin-top:0">1 USD = ? CUP</label><input class="in" id="rateIn" type="number" step="0.01" style="max-width:180px" value="${set.usdRate||""}" placeholder="Ej. 420" /></div>
        <button class="btn-sm" onclick="saveRate()">Guardar tasa</button>
      </div>
    </div>
    <div class="settings-grid">
      <div class="panel">
        <h3>Copia de seguridad</h3>
        <p style="font-size:13.5px;color:var(--plum);line-height:1.6;margin-top:0">Todo se guarda solo en este dispositivo. Guarda una copia a diario; si el aparato se rompe o se borra, la restauras y no pierdes nada.</p>
        <button class="btn-sm" onclick="backup()">Descargar copia</button>
        <button class="btn-sm alt" onclick="shareBackup()" style="margin-left:8px">Compartir copia</button>
        <div style="height:10px"></div>
        <button class="btn-sm alt" onclick="shareSummary()">Compartir resumen del día</button>
        <button class="btn-sm alt" onclick="shareCatalog()" style="margin-left:8px">Compartir catálogo</button>
        <div style="height:10px"></div>
        <label class="fld" style="margin-top:0">Restaurar desde una copia</label>
        <input type="file" id="restoreFile" accept="application/json" class="in" />
        <div style="height:10px"></div>
        <button class="btn-sm alt" onclick="restore()">Restaurar</button>
      </div>
      <div class="panel">
        <h3>Seguridad y datos</h3>
        <button class="btn-sm alt" onclick="changePin()">Cambiar PIN de Administrador</button>
        <div style="height:14px"></div>
        <div class="mini">Ventas guardadas: <b style="color:var(--ink)">${sales.length}</b></div>
        <div style="height:14px"></div>
        <button class="btn-sm" style="background:var(--warn)" onclick="wipe()">Borrar todo y empezar de cero</button>
      </div>
    </div>`;
}
function saveRate(){
  const v=parseFloat($("#rateIn").value);
  if(!v||v<=0){toast("Escribe una tasa válida (ej. 420).");return;}
  const s=getSettings(); s.usdRate=v; s.usdRateDate=new Date().toISOString(); saveSettings(s);
  toast("Tasa actualizada"); renderSettings();
}
function backup(){
  const data={app:"lacca",v:3,exported:new Date().toISOString(),products:getProducts(),sales:getSales(),returns:getReturns(),settings:getSettings()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  const d=new Date(); const stamp=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  a.href=URL.createObjectURL(blob); a.download="divas-nails-copia-"+stamp+".json"; a.click(); URL.revokeObjectURL(a.href);
  toast("Copia descargada");
}
function restore(){
  const f=$("#restoreFile").files[0]; if(!f){toast("Elige primero un archivo de copia.");return;}
  const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.products)throw 0;if(!confirm("Esto reemplazará los datos actuales por los de la copia. ¿Continuar?"))return;saveProducts(d.products);saveSales(d.sales||[]);if(d.returns)saveReturns(d.returns);if(d.settings)saveSettings(d.settings);toast("Datos restaurados");renderSettings();}catch(err){toast("El archivo no es una copia válida de Divas Nails.");}};
  r.readAsText(f);
}
function changePin(){
  const a=prompt("Nuevo PIN (4 dígitos):"); if(a===null)return;
  if(!/^\d{4}$/.test(a)){toast("El PIN debe tener 4 dígitos.");return;}
  const s=getSettings(); s.pin=a; saveSettings(s); toast("PIN actualizado");
}
function wipe(){
  if(!confirm("Se borrarán TODOS los productos, ventas y devoluciones de este dispositivo. No se puede deshacer. ¿Seguro?"))return;
  if(!confirm("Última confirmación: ¿borrar todo?"))return;
  saveProducts(SEED.map(p=>({...p,id:uid()}))); saveSales([]); saveReturns([]); toast("Todo reiniciado"); renderInv();
}

/* ================= VENDEDOR/A ================= */
let TICKET={}; let cFilter={q:"",cat:"Todo"};
function renderClerk(){
  const prods=getProducts();
  const cats=["Todo",...CATS];
  const list=prods.filter(p=>(cFilter.cat==="Todo"||p.category===cFilter.cat)&&p.name.toLowerCase().includes(cFilter.q.toLowerCase()));
  const cards=list.map(p=>{const inT=TICKET[p.id]||0,out=p.stock===0;
    const ctrl=inT===0?`<button class="sell" ${out?"disabled style='opacity:.5'":""} onclick="addT('${p.id}')">${out?"Agotado":"Vender"}</button>`
      :`<div class="stepper"><button class="step" onclick="subT('${p.id}')">−</button><span style="font-weight:600">${inT}</span><button class="step" ${inT>=p.stock?"disabled style='opacity:.4'":""} onclick="addT('${p.id}')">+</button></div>`;
    return `<div class="prod ${inT?'sel':''}" style="${out?'opacity:.5':''}">${p.img?`<img class="prodimg" src="${p.img}" alt="">`:''}<div class="pn">${esc(p.name)}</div>
      <div class="meta"><span class="price">${money(p.price)}</span><span class="qty" style="${p.stock<=p.min?'color:var(--warn)':''}">${p.stock} uds.</span></div>${ctrl}</div>`;}).join("");
  const lines=Object.entries(TICKET).filter(([,n])=>n>0);
  const total=lines.reduce((a,[id,n])=>{const p=prods.find(x=>x.id===id);return a+(p?p.price*n:0);},0);
  const items=lines.length===0?`<div class="empty">Toca “Vender” en un producto para añadirlo.</div>`
    :lines.map(([id,n])=>{const p=prods.find(x=>x.id===id);return p?`<div class="titem"><span>${n}× ${esc(p.name)}</span><span style="font-weight:600;text-align:right">${money(p.price*n)}</span></div>`:"";}).join("");
  $("#viewRoot").innerHTML=`<div class="clerk"><div>
    <div class="filters">
      <input class="in" style="flex:1;min-width:170px" id="cSearch" placeholder="Buscar producto…" value="${esc(cFilter.q)}" />
      <div style="display:flex;gap:7px;flex-wrap:wrap">${cats.map(c=>`<button class="chip ${cFilter.cat===c?'on':''}" onclick="setCat('${c}')">${c}</button>`).join("")}</div>
    </div>
    <div class="grid">${cards}</div></div>
    <div class="ticket"><h3>Ticket actual</h3><div class="who">Atiende: ${esc(sellerName||"Mostrador")}</div>
      <div class="items">${items}</div>
      <div class="ttot"><span style="color:var(--muted);font-size:13px;padding-top:4px">Total</span><span class="n">${money(total)}</span></div>
      <button class="btn" ${lines.length===0?"disabled":""} onclick="doSale()">Registrar venta</button>
      <button class="btn alt" style="margin-top:8px" onclick="openReturn()">Registrar devolución / merma</button>
      <button class="btn alt" style="margin-top:8px" onclick="shareSummary()">Enviar resumen al administrador</button>
      <button class="btn alt" style="margin-top:8px" onclick="shareCatalog()">Compartir catálogo</button>
    </div></div>`;
  const s=$("#cSearch");
  s.oninput=(e)=>{cFilter.q=e.target.value;const pos=e.target.selectionStart;renderClerk();const n=$("#cSearch");n.focus();n.setSelectionRange(pos,pos);};
}
function setCat(c){cFilter.cat=c;renderClerk();}
function addT(id){const p=getProducts().find(x=>x.id===id);if(!p)return;if((TICKET[id]||0)>=p.stock)return;TICKET[id]=(TICKET[id]||0)+1;renderClerk();}
function subT(id){TICKET[id]=Math.max(0,(TICKET[id]||0)-1);if(!TICKET[id])delete TICKET[id];renderClerk();}
function doSale(){
  const prods=getProducts();
  const lines=[]; let total=0,units=0;
  for(const [id,qty] of Object.entries(TICKET)){ if(qty<=0)continue; const p=prods.find(x=>x.id===id); if(!p)continue; const q=Math.min(qty,p.stock); if(q<=0)continue; p.stock-=q; lines.push({productId:p.id,name:p.name,qty:q,price:p.price,total:+(q*p.price).toFixed(2)}); total+=q*p.price; units+=q; }
  if(lines.length===0){toast("No hay nada que registrar.");return;}
  const sale={id:uid(),ts:new Date().toISOString(),seller:sellerName||"Mostrador",lines,total:+total.toFixed(2),units};
  saveProducts(prods); const sales=getSales(); sales.push(sale); saveSales(sales);
  TICKET={}; renderClerk(); toast("Venta registrada · "+moneyInline(sale.total));
}

showGate();

if('serviceWorker' in navigator && (location.protocol==='https:'||location.hostname==='localhost')){
  navigator.serviceWorker.register('./sw.js').catch(function(err){});
}
</script>
</body>
</html>
