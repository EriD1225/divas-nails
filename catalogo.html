<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#C43E6D" />
<title>Divas Nails · Catálogo</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#FCF8F6; --ink:#2A1A2E; --plum:#6E3B5C; --lacquer:#C43E6D; --lacquerDeep:#A62B57;
    --blush:#F7E9EE; --line:#EAD3DC; --champ:#B8924F; --ok:#4E8D6E; --muted:#8B7683; --white:#fff;
    --f-disp:'Fraunces',Georgia,serif; --f-body:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--f-body);-webkit-font-smoothing:antialiased}
  .head{background:linear-gradient(135deg,#fff,#FCEFF3);border-bottom:1px solid var(--line)}
  .head .in{max-width:1080px;margin:0 auto;padding:26px 20px 22px;text-align:center}
  .brand{display:inline-flex;align-items:center;gap:12px}
  .brand .name{font-family:var(--f-disp);font-size:34px;font-weight:600;letter-spacing:-.02em}
  .tag{color:var(--muted);font-size:14px;margin:8px 0 0}
  .rate{font-size:12.5px;color:var(--plum);background:var(--blush);display:inline-block;padding:4px 12px;border-radius:999px;margin-top:12px}
  .wrap{max-width:1080px;margin:0 auto;padding:20px 20px 90px}
  .tools{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
  .search{flex:1;min-width:200px;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:15px;font-family:inherit;outline:none;background:#fff}
  .search:focus{border-color:var(--lacquer)}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{border:1px solid var(--line);background:#fff;color:var(--plum);border-radius:999px;padding:8px 14px;font-size:13px;cursor:pointer}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
  .ph{width:100%;aspect-ratio:1/1;object-fit:cover;background:var(--blush);display:block}
  .ph.no{display:grid;place-items:center;font-size:52px}
  .body{padding:14px;display:flex;flex-direction:column;gap:6px;flex:1}
  .cat{font-size:11px;color:var(--plum);background:var(--blush);border-radius:999px;padding:2px 9px;align-self:flex-start}
  .nm{font-size:15px;font-weight:500;line-height:1.35}
  .pr{font-family:var(--f-disp);font-weight:600;color:var(--lacquerDeep);font-size:18px;margin-top:2px}
  .usd{font-size:12.5px;color:var(--muted);font-weight:400}
  .av{font-size:12px;color:var(--ok);font-weight:600;margin-top:2px}
  .wa{margin-top:10px;background:#25D366;color:#fff;border:none;border-radius:10px;padding:10px;font-size:13.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;text-decoration:none}
  .wa:hover{filter:brightness(.96)}
  .empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:50px 0;font-size:14.5px}
  .foot{text-align:center;color:var(--muted);font-size:12.5px;padding:26px 20px 40px}
  .foot b{color:var(--plum)}
  .skel{height:270px;border-radius:16px;background:linear-gradient(90deg,#f3e7ec,#faf2f5,#f3e7ec);background-size:200% 100%;animation:sh 1.3s infinite}
  @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>

<div class="head"><div class="in">
  <div class="brand"><svg width="46" height="46" viewBox="0 0 48 48"><defs><linearGradient id="lgd" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C43E6D"/><stop offset="1" stop-color="#A62B57"/></linearGradient></defs><path d="M10 17 L12 10 L15.5 13 L17 8 L18.5 13 L22 10 L24 17 Z" fill="#B8924F"/><circle cx="12" cy="9" r="1.6" fill="#B8924F"/><circle cx="17" cy="7" r="1.6" fill="#B8924F"/><circle cx="22" cy="9" r="1.6" fill="#B8924F"/><rect x="14" y="17" width="6" height="5" fill="#6E3B5C"/><rect x="8" y="22" width="18" height="22" rx="5" fill="#F3D2DE"/><rect x="10.5" y="28" width="13" height="13.5" rx="3" fill="url(#lgd)"/><ellipse cx="12.5" cy="34" rx="1.8" ry="5" fill="#fff" opacity=".45"/><g transform="rotate(12 38 18)"><rect x="36.2" y="8" width="3.6" height="11" rx="1.8" fill="#B8924F"/><rect x="36.4" y="19" width="3.2" height="2" fill="#6E3B5C"/><path d="M36.5 21 L39.5 21 L38.6 26.5 L37.4 26.5 Z" fill="#6E3B5C"/><path d="M37.4 26.5 L38.6 26.5 L38 28.5 Z" fill="#C43E6D"/></g><path d="M38 30C38 30 34 35 34 38.4a4.3 4.3 0 0 0 8.6 0c0-3.4-4.3-8.4-4.3-8.4Z" fill="url(#lgd)"/><circle cx="36.3" cy="37.3" r="1.1" fill="#fff" opacity=".5"/><path d="M44 5 l1 2.2 2.2 1 -2.2 1 -1 2.2 -1 -2.2 -2.2 -1 2.2 -1 Z" fill="#B8924F"/></svg><span class="name">Divas <i style="color:var(--lacquer)">Nails</i></span></div>
  <p class="tag">Productos de manicura, pedicura y belleza · disponibles ahora</p>
  <div class="rate" id="rate"></div>
</div></div>

<div class="wrap">
  <div class="tools">
    <input class="search" id="q" placeholder="Buscar un producto…" />
    <div class="chips" id="chips"></div>
  </div>
  <div class="grid" id="grid">
    <div class="skel"></div><div class="skel"></div><div class="skel"></div><div class="skel"></div>
  </div>
</div>

<div class="foot">Divas Nails 👑 · Los precios en USD son una referencia según la tasa del día.<br id="fb">Escríbenos por WhatsApp para reservar o encargar.</div>

<script>
const SB_URL="https://rmdtwanaaanbbybozwue.supabase.co", SB_KEY="sb_publishable_VhJ6oqTcZ9vmSr1EbHSxVg_fqmoYpL7";
const sb = supabase.createClient(SB_URL, SB_KEY);
const $=(s)=>document.querySelector(s);
const fmt=(n)=>(Number(n)||0).toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2});
let ALL=[], RATE=0, ZF=0, cat="Todo", q="", WANUMS=[];

async function load(){
  try{
    const rs=await sb.from("settings").select("usd_rate,whatsapp,zelle_factor").eq("id",1).single();
    if(rs.data){ RATE=Number(rs.data.usd_rate)||0; ZF=Number(rs.data.zelle_factor)||0; WANUMS=(rs.data.whatsapp||"").split(",").map(function(x){return x.replace(/[^0-9]/g,"");}).filter(function(x){return x.length>0;}); }
  }catch(e){}
  const { data, error } = await sb.from("public_catalog").select("*");
  if(error){ $("#grid").innerHTML='<div class="empty">No pudimos cargar el catálogo ahora mismo. Intenta de nuevo en un momento.</div>'; return; }
  ALL = data||[];
  if(RATE>0) $("#rate").textContent="Tasa de hoy: 1 USD = "+fmt(RATE)+" CUP";
  buildChips(); render();
}
function buildChips(){
  const cats=["Todo",...Array.from(new Set(ALL.map(p=>p.category))).sort()];
  $("#chips").innerHTML=cats.map(c=>`<button class="chip ${c===cat?'on':''}" data-c="${c}">${c}</button>`).join("");
  $("#chips").querySelectorAll(".chip").forEach(b=>b.onclick=()=>{cat=b.dataset.c;buildChips();render();});
}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function render(){
  let list=ALL.filter(p=>(cat==="Todo"||p.category===cat)&&p.name.toLowerCase().includes(q.toLowerCase()));
  list.sort((a,b)=>a.name.localeCompare(b.name));
  if(list.length===0){ $("#grid").innerHTML='<div class="empty">No hay productos que coincidan con tu búsqueda.</div>'; return; }
  $("#grid").innerHTML=list.map(p=>{
    const isU=(p.currency==="USD");
    const mainTxt=isU?`$${fmt(p.price)} USD`:`${fmt(p.price)} CUP`;
    const subVal=isU?(RATE>0?p.price*RATE:null):(RATE>0?p.price/RATE:null);
    const usd=subVal!=null?`<span class="usd"> · ≈ ${isU?(fmt(subVal)+" CUP"):("$"+fmt(subVal)+" USD")}</span>`:"";
    const zVal=ZF>0?(isU?p.price*ZF:(RATE>0?(p.price/RATE)*ZF:null)):null;
    const zel=(zVal!=null)?`<div class="usd" style="color:#B8924F;font-weight:600">≈ $${fmt(zVal)} Zelle</div>`:"";
    const img=p.img?`<img class="ph" src="${p.img}" alt="${esc(p.name)}" loading="lazy">`:`<div class="ph no">💅</div>`;
    let wa="";
    if(WANUMS.length){ const num=WANUMS[0]; const msg=encodeURIComponent("¡Hola Divas Nails! Me interesa este producto: "+p.name); wa=`<a class="wa" href="https://wa.me/${num}?text=${msg}" target="_blank" rel="noopener">Pedir por WhatsApp</a>`; }
    return `<div class="card">${img}<div class="body"><span class="cat">${esc(p.category)}</span><div class="nm">${esc(p.name)}</div><div class="pr">${mainTxt}${usd}</div>${zel}<div class="av">● Disponible</div>${wa}</div></div>`;
  }).join("");
}
$("#q").addEventListener("input",e=>{q=e.target.value;render();});
sb.channel("catalogo-live").on("postgres_changes",{event:"*",schema:"public",table:"products"},()=>load()).subscribe();
load();
</script>
</body>
</html>
